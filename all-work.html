  <style>
    /* =========================
       BASIC RESET
       ========================= */

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;

      font-family: "Inter", Arial, sans-serif;
      color: #111318;

      background:
        radial-gradient(
          circle at 10% 5%,
          rgba(37, 99, 235, 0.08),
          transparent 30%
        ),
        radial-gradient(
          circle at 90% 25%,
          rgba(124, 58, 237, 0.07),
          transparent 30%
        ),
        #f8fafc;
    }

    button,
    a {
      font-family: inherit;
    }


    /* =========================
       HEADER
       ========================= */

    .topbar {
      position: sticky;
      top: 0;
      z-index: 50;

      width: 100%;
      height: 58px;

      display: flex;
      align-items: center;
      justify-content: space-between;

      padding: 0 52px;

      background: rgba(255, 255, 255, 0.96);
      border-bottom: 1px solid rgba(15, 23, 42, 0.12);

      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;

      color: #111318;
      text-decoration: none;

      font-size: 16px;
      font-weight: 800;
    }

    .brand-mark {
      width: 30px;
      height: 30px;

      display: grid;
      place-items: center;

      border-radius: 8px;

      color: #ffffff;
      font-size: 12px;
      font-weight: 900;

      background:
        linear-gradient(
          135deg,
          #2563eb,
          #7c3aed
        );

      box-shadow:
        0 5px 12px rgba(37, 99, 235, 0.25);
    }

    .topbar nav {
      display: flex;
      align-items: center;
      gap: 30px;
    }

    .topbar nav a {
      color: #17191f;
      text-decoration: none;

      font-size: 12px;
      font-weight: 800;
      letter-spacing: 1.2px;
      text-transform: uppercase;

      transition: color 0.2s ease;
    }

    .topbar nav a:hover {
      color: #2563eb;
    }


    /* =========================
       MAIN AREA
       ========================= */

    main {
      width: min(calc(100% - 64px), 1820px);

      margin: 0 auto;
      padding: 22px 0 70px;
    }


    /* =========================
       PAGE HEADING
       ========================= */

    .heading {
      width: 100%;

      margin: 0 auto 28px;
      padding: 0;

      text-align: center;
    }

    .heading h1 {
      margin: 0;

      font-family: "Anton", Impact, "Arial Narrow", sans-serif;
      font-size: clamp(58px, 5vw, 82px);
      font-weight: 400;

      letter-spacing: 10px;
      line-height: 0.95;

      color: #111318;
    }

    .heading p {
      margin: 12px auto 0;

      color: #626b7a;

      font-size: 16px;
      font-weight: 400;
      letter-spacing: 0.5px;
      line-height: 1.4;
    }


    /* =========================
       THUMBNAIL GRID
       ========================= */

    .gallery {
      display: grid;

      grid-template-columns:
        repeat(3, minmax(0, 1fr));

      column-gap: 26px;
      row-gap: 26px;
    }

    .work-card {
      min-width: 0;
    }

    .thumb-button {
      position: relative;

      display: block;

      width: 100%;
      aspect-ratio: 16 / 9;

      padding: 0;

      overflow: hidden;

      border: 0;
      border-radius: 4px;

      background: #e5e7eb;

      cursor: pointer;

      box-shadow:
        0 7px 20px rgba(15, 23, 42, 0.10);

      transition:
        transform 0.25s ease,
        box-shadow 0.25s ease;
    }

    .thumb-button img {
      display: block;

      width: 100%;
      height: 100%;

      object-fit: cover;

      transition:
        transform 0.3s ease,
        filter 0.3s ease;
    }

    .thumb-button:hover {
      transform: translateY(-3px);

      box-shadow:
        0 14px 30px rgba(15, 23, 42, 0.16);
    }

    .thumb-button:hover img {
      transform: scale(1.025);
      filter: brightness(0.76);
    }


    /* =========================
       VIEW DESIGN HOVER BUTTON
       ========================= */

    .view-label {
      position: absolute;
      left: 50%;
      top: 50%;

      transform: translate(-50%, -42%);

      padding: 11px 16px;

      border:
        1px solid rgba(255, 255, 255, 0.75);

      background:
        rgba(15, 23, 42, 0.76);

      color: #ffffff;

      font-size: 13px;
      font-weight: 800;

      opacity: 0;

      transition:
        opacity 0.25s ease,
        transform 0.25s ease;
    }

    .thumb-button:hover .view-label {
      opacity: 1;

      transform:
        translate(-50%, -50%);
    }


    /* =========================
       DUMMY LABEL
       ========================= */

    .dummy-badge {
      position: absolute;
      top: 12px;
      right: 12px;

      padding: 7px 10px;

      border-radius: 6px;

      color: #ffffff;

      background:
        rgba(15, 23, 42, 0.82);

      font-size: 10px;
      font-weight: 900;
      letter-spacing: 1.2px;
    }


    /* =========================
       IMAGE PREVIEW MODAL
       ========================= */

    .modal {
      position: fixed;
      inset: 0;
      z-index: 100;

      display: none;
      align-items: center;
      justify-content: center;

      padding: 28px;

      background:
        rgba(3, 7, 18, 0.92);
    }

    .modal.open {
      display: flex;
    }

    .modal img {
      width: min(1280px, 94vw);
      max-height: 88vh;

      object-fit: contain;

      box-shadow:
        0 24px 80px rgba(0, 0, 0, 0.55);
    }

    .close {
      position: absolute;
      right: 26px;
      top: 18px;

      border: 0;

      background: transparent;
      color: #ffffff;

      font-size: 42px;
      line-height: 1;

      cursor: pointer;
    }


    /* =========================
       TABLET
       ========================= */

    @media (max-width: 1050px) {
      main {
        width: min(calc(100% - 36px), 1820px);
      }

      .gallery {
        grid-template-columns:
          repeat(2, minmax(0, 1fr));
      }
    }

       MOBILE
       ========================= */

      }

        letter-spacing: 0.3px;

        padding-bottom: 50px;
      }

      .heading {

      }

      .heading h1 {

        letter-spacing: 6px;
      }

      .heading p {

      }

      .gallery {

        row-gap: 22px;
      }

      .view-label {
        display: none;
      }
    }


    /* =========================
       SMALL MOBILE
       ========================= */

      }

        font-size: 9px;
      }

      .topbar nav a:nth-child(3) {

      }

      .heading h1 {
        font-size: 42px;
        letter-spacing: 5px;
      }
    }
  </style>

  <!-- Full Image Preview -->
  <div
    class="modal"
    id="previewModal"
    role="dialog"
    aria-modal="true"
    aria-hidden="true"
  >

    <button
      class="close"
      id="closeModal"
      type="button"
      aria-label="Close preview"
    >
      &times;
    </button>

    <img
      id="previewImage"
      src=""
      alt="Large thumbnail preview"
    >

  </div>


  <script>
    const modal =
      document.getElementById("previewModal");

    const preview =
      document.getElementById("previewImage");

    const closeButton =
      document.getElementById("closeModal");


    document
      .querySelectorAll(".thumb-button")
      .forEach((button) => {

        button.addEventListener("click", () => {

          preview.src =
            button.dataset.full;

          modal.classList.add("open");

          modal.setAttribute(
            "aria-hidden",
            "false"
          );

          document.body.style.overflow =
            "hidden";

        });

      });


    function closeModal() {

      modal.classList.remove("open");

      modal.setAttribute(
        "aria-hidden",
        "true"
      );

      preview.removeAttribute("src");

      document.body.style.overflow = "";

    }


    closeButton.addEventListener(
      "click",
      closeModal
    );


    modal.addEventListener(
      "click",
      (event) => {

        if (event.target === modal) {
          closeModal();
        }

      }
    );


    document.addEventListener(
      "keydown",
      (event) => {

        if (
          event.key === "Escape" &&
          modal.classList.contains("open")
        ) {
          closeModal();
        }

      }
    );
  </script>
